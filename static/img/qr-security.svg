<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Flux securizat cu QR</title>
  <desc id="desc">Buletin QR, scanare OMR, salvare imagine si review uman.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1724"/>
      <stop offset="100%" stop-color="#1b2a3b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1b2f47"/>
      <stop offset="100%" stop-color="#1f4464"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="560" rx="24" fill="url(#bg)"/>
  <rect x="30" y="30" width="860" height="500" rx="20" fill="none" stroke="#2c4f71"/>

  <rect x="70" y="120" width="220" height="310" rx="16" fill="#f8fafc"/>
  <rect x="88" y="146" width="184" height="18" rx="6" fill="#d0dbe7"/>
  <rect x="88" y="176" width="184" height="12" rx="5" fill="#d0dbe7"/>
  <rect x="88" y="199" width="184" height="12" rx="5" fill="#d0dbe7"/>
  <rect x="88" y="222" width="184" height="12" rx="5" fill="#d0dbe7"/>
  <rect x="88" y="255" width="52" height="52" rx="6" fill="#0f1724"/>
  <rect x="146" y="255" width="126" height="52" rx="8" fill="#e3ecf5"/>
  <text x="90" y="337" fill="#0f1724" font-size="18" font-family="Arial, sans-serif" font-weight="700">QR: V012-0048</text>
  <text x="90" y="365" fill="#334155" font-size="16" font-family="Arial, sans-serif">Buletin unic</text>

  <rect x="352" y="98" width="230" height="130" rx="14" fill="url(#panel)" stroke="#5ea7db"/>
  <text x="372" y="142" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="700">Scanare OMR</text>
  <text x="372" y="172" fill="#c8ddf0" font-size="16" font-family="Arial, sans-serif">Citire QR + detectie vot</text>
  <text x="372" y="195" fill="#c8ddf0" font-size="16" font-family="Arial, sans-serif">Validare sesiune</text>

  <rect x="352" y="270" width="230" height="130" rx="14" fill="url(#panel)" stroke="#5ea7db"/>
  <text x="372" y="312" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="700">Salvare date</text>
  <text x="372" y="342" fill="#c8ddf0" font-size="16" font-family="Arial, sans-serif">Imagine buletin</text>
  <text x="372" y="365" fill="#c8ddf0" font-size="16" font-family="Arial, sans-serif">Voturi + timestamp</text>

  <rect x="644" y="184" width="210" height="180" rx="14" fill="#183552" stroke="#5ea7db"/>
  <text x="664" y="228" fill="#f8fafc" font-size="24" font-family="Arial, sans-serif" font-weight="700">Review</text>
  <text x="664" y="258" fill="#d4e7f7" font-size="16" font-family="Arial, sans-serif">Confirmare</text>
  <text x="664" y="283" fill="#d4e7f7" font-size="16" font-family="Arial, sans-serif">sau corectie</text>
  <text x="664" y="318" fill="#7dd3fc" font-size="16" font-family="Arial, sans-serif">Audit transparent</text>

  <path d="M300 272 C325 272, 336 180, 346 162" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M300 285 C327 290, 336 335, 346 336" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M592 162 C625 162, 635 214, 644 230" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M592 336 C628 336, 635 312, 644 300" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <text x="70" y="490" fill="#93c5fd" font-size="18" font-family="Arial, sans-serif">Proces sigur pentru alegeri transparente</text>
</svg>
